services:
  app-gymin:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres-shared-rsrkdf
      DB_PORT: "5432"
    networks:
      - gymin-network
      - dokploy-network
    volumes:
      - public_data:/shared-public
    healthcheck:
      test: ["CMD-SHELL", "php -r '$$s=@fsockopen(\"127.0.0.1\",9000); exit($$s ? 0 : 1);'"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 20s
    restart: always

  web-gymin:
    image: nginx:alpine
    volumes:
      - ./docker/nginx/gymin.conf:/etc/nginx/conf.d/default.conf
      - public_data:/var/www/html/public
    depends_on:
      app-gymin:
        condition: service_healthy
      reverb-gymin:
        condition: service_started
    networks:
      - gymin-network
      - dokploy-network
    restart: always

  queue-gymin:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres-shared-rsrkdf
      DB_PORT: "5432"
    command: ["php", "artisan", "queue:work", "--tries=3", "--timeout=90"]
    networks:
      - gymin-network
      - dokploy-network
    restart: always

  reverb-gymin:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres-shared-rsrkdf
      DB_PORT: "5432"
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    networks:
      - gymin-network
      - dokploy-network
    restart: always

networks:
  gymin-network:
    driver: bridge

  dokploy-network:
    external: true

volumes:
  public_data:
